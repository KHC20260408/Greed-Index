name: Daily Scrape CNN Fear & Greed Index

permissions:
  contents: write

env:
  # 以 Node.js 24 試跑（建議）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 臨時回退允許使用 Node20（短期救援），升級成功後請移除或設為 'false'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

on:
  schedule:
    - cron: '0 1 * * *' # 每日 01:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python environment info
        run: |
          python -V
          which python || command -v python
          python -m pip --version

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify installed packages
        run: |
          python -c "import requests, bs4; print('requests', requests.__version__); print('bs4', bs4.__version__)"

      - name: Run scraper
        run: python greed-index-scraper.py

      - name: Commit and push data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "greed-index-data.csv"; then
            git add greed-index-data.csv
            git commit -m "Update Greed Index data: $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
