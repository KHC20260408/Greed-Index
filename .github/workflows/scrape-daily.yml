name: Daily Scrape CNN Fear & Greed Index

# 明確給予工作流程寫入 repo 的權限（確保��以用 GITHUB_TOKEN commit/push）
permissions:
  contents: write

# 立即以 Node.js 24 執行 JavaScript actions（提前測試相容性）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 若遇到相容性導致 step 失敗，臨時開啟下面這行以允許 Node20（短期救援）
  # ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

on:
  schedule:
    - cron: '0 1 * * *' # 每日 01:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run scraper
        run: python greed-index-scraper.py

      - name: Commit and push data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "greed-index-data.csv"; then
            git add greed-index-data.csv
            git commit -m "Update Greed Index data: $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
