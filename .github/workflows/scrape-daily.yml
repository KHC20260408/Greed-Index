name: Daily Scrape CNN Fear & Greed Index

# 確保 workflow 有寫入 repo 的權限（用 GITHUB_TOKEN）
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # 若發生相容性問題，暫時啟用下列為 'true'（短期救援，不建議長期使用）
  # ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

on:
  schedule:
    - cron: '0 1 * * *' # 每日 01:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run scraper
        run: python greed-index-scraper.py

      - name: Commit and push data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "greed-index-data.csv"; then
            git add greed-index-data.csv
            git commit -m "Update Greed Index data: $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
